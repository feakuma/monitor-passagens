name: Update Version

on:
  push:
    branches: [main]

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Update version in index.html
        run: |
          DATE=$(date +'%Y.%m.%d')
          RUN=${{ github.run_number }}
          sed -i "s/v[0-9]*\.[0-9]*\.[0-9]* · build [0-9]*/v${DATE} · build ${RUN}/g" index.html

      - name: Commit updated version
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: update version to v${DATE} · build ${{ github.run_number }}"
          git push
